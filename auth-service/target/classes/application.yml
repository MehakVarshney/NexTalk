server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nextalk_auth}
    username: ${SPRING_DATASOURCE_USERNAME:nextalk}
    password: ${SPRING_DATASOURCE_PASSWORD:nextalk}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:nextalk-local-development-secret-key-change-me-please-123456}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:1440}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
    com.nextalk.auth: INFO
