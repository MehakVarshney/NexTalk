server:
  port: ${SERVER_PORT:8761}

spring:
  application:
    name: eureka-server
  output:
    ansi:
      enabled: always

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: false
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
  server:
    enable-self-preservation: ${EUREKA_ENABLE_SELF_PRESERVATION:true}
    eviction-interval-timer-in-ms: ${EUREKA_EVICTION_INTERVAL_MS:60000}
    response-cache-update-interval-ms: ${EUREKA_RESPONSE_CACHE_UPDATE_INTERVAL_MS:30000}
    peer-node-read-timeout-ms: 3000
    peer-node-connect-timeout-ms: 3000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
    org.springframework.cloud.netflix.eureka: INFO
